name: Tests & CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phpunit:
    name: PHPUnit on PHP ${{ matrix.php-version }} / WP ${{ matrix.wordpress-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.0', '8.1', '8.2']
        wordpress-version: ['6.4', '6.5']
    env:
      WORDPRESS_VERSION: ${{ matrix.wordpress-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring
          coverage: pcov
          tools: phpdbg

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit suite
        run: phpdbg -qrr vendor/bin/phpunit --configuration phpunit.xml.dist --testsuite fp-publisher
