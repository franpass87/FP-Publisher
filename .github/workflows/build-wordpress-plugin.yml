name: Build WordPress Plugin ZIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [created]

env:
  PLUGIN_DIR: wp-content/plugins/trello-social-auto-publisher
  BUILD_ROOT: build
  DIST_DIR: build/fp-publisher
  DIST_NAME: fp-publisher-wordpress-plugin

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract plugin version
      id: version
      run: |
        set -euo pipefail
        main_file="${PLUGIN_DIR}/trello-social-auto-publisher.php"
        VERSION=$(grep -Eo "Version:[[:space:]]*[0-9A-Za-z\.-]+" "$main_file" | sed 's/Version:[[:space:]]*//')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Plugin version: $VERSION"

    - name: Prepare build directory
      run: |
        set -euo pipefail
        rm -rf "$BUILD_ROOT"
        mkdir -p "$DIST_DIR"

    - name: Copy plugin sources
      run: |
        set -euo pipefail
        rsync -av --exclude='.git' "${PLUGIN_DIR}/" "$DIST_DIR/"

    - name: Include documentation
      run: |
        set -euo pipefail
        docs=(
          README.md
          OPTIMIZATION_GUIDE.md
          SECURITY_IMPROVEMENTS.md
          SOCIAL_MEDIA_SETUP.md
          ENTERPRISE_FEATURES.md
          MENU_STRUCTURE.md
        )
        for doc in "${docs[@]}"; do
          if [[ -f "$doc" ]]; then
            cp "$doc" "$DIST_DIR/"
          fi
        done

    - name: Clean distribution directory
      run: |
        set -euo pipefail
        patterns=(
          "*.log"
          "*.tmp"
          "*.temp"
          ".DS_Store"
          "Thumbs.db"
          "*.bak"
          "*.swp"
          "*.swo"
          "*~"
        )
        for pattern in "${patterns[@]}"; do
          find "$DIST_DIR" -name "$pattern" -delete
        done
        directories=(
          node_modules
          .git
          .sass-cache
          vendor
          .vscode
          .idea
          cache
          tmp
        )
        for dir in "${directories[@]}"; do
          find "$DIST_DIR" -name "$dir" -type d -exec rm -rf {} + 2>/dev/null || true
        done

    - name: Create plugin archives
      run: |
        set -euo pipefail
        pushd "$DIST_DIR" >/dev/null
        zip -r "../${DIST_NAME}-v${{ steps.version.outputs.version }}.zip" . -x "*.git*" "*.DS_Store" "Thumbs.db"
        popd >/dev/null
        cp "${BUILD_ROOT}/${DIST_NAME}-v${{ steps.version.outputs.version }}.zip" "${BUILD_ROOT}/${DIST_NAME}.zip"

    - name: Inspect package contents
      run: |
        set -euo pipefail
        echo "=== ZIP file contents ==="
        unzip -l "${BUILD_ROOT}/${DIST_NAME}.zip" | head -20
        echo "\n=== ZIP file info ==="
        ls -lh "${BUILD_ROOT}/${DIST_NAME}"*.zip
        echo "\n=== Verifying WordPress plugin structure ==="
        archive="${BUILD_ROOT}/${DIST_NAME}.zip"
        if unzip -l "$archive" | grep -q "trello-social-auto-publisher.php"; then
          echo "✅ Main plugin file found"
        else
          echo "❌ Main plugin file missing"
          exit 1
        fi
        if unzip -l "$archive" | grep -q "includes/"; then
          echo "✅ Includes directory found"
        else
          echo "❌ Includes directory missing"
        fi
        if unzip -l "$archive" | grep -q "admin/"; then
          echo "✅ Admin directory found"
        else
          echo "❌ Admin directory missing"
        fi

    - name: Upload versioned plugin ZIP
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIST_NAME }}-v${{ steps.version.outputs.version }}
        path: |
          ${{ env.BUILD_ROOT }}/${{ env.DIST_NAME }}-v${{ steps.version.outputs.version }}.zip
          ${{ env.BUILD_ROOT }}/${{ env.DIST_NAME }}.zip
        retention-days: 30

    - name: Upload latest plugin ZIP
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIST_NAME }}-latest
        path: ${{ env.BUILD_ROOT }}/${{ env.DIST_NAME }}.zip
        retention-days: 30

    - name: Upload to release (if this is a release)
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ env.BUILD_ROOT }}/${{ env.DIST_NAME }}-v${{ steps.version.outputs.version }}.zip
        asset_name: ${{ env.DIST_NAME }}-v${{ steps.version.outputs.version }}.zip
        asset_content_type: application/zip